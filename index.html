
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거래처 홈페이지 도메인 리스트</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --primary:#1a7f6e; --primary-dark:#14655a; --primary-light:#e6f4f1;
  --ink:#1c2b2a; --sub:#5f7472; --line:#e3ecea; --bg:#f5f9f8; --card:#ffffff;
  --stop:#c25b4e; --stop-bg:#faeeec; --etc:#7a6bb0; --etc-bg:#f0edf9;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
.dl-wrap{max-width:1200px;margin:0 auto;padding:0 20px 80px}

.dl-header{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);padding:44px 20px 40px;text-align:center;color:#fff}
.dl-header h1{font-size:26px;font-weight:800;letter-spacing:-.02em}
.dl-header p{margin-top:8px;font-size:14px;opacity:.85}
.dl-header .dl-count{display:inline-block;margin-top:14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:100px;padding:6px 18px;font-size:13px;font-weight:600}

.dl-controls{position:sticky;top:0;z-index:10;background:var(--bg);padding:18px 0 12px;border-bottom:1px solid var(--line)}
.dl-row1{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.dl-search{flex:1;min-width:220px;position:relative}
.dl-search input{width:100%;padding:11px 16px 11px 40px;border:1.5px solid var(--line);border-radius:12px;font-size:14px;font-family:inherit;background:var(--card);outline:none;transition:border-color .2s}
.dl-search input:focus{border-color:var(--primary)}
.dl-search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--sub)}
.dl-status{padding:10px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--card);font-size:13px;font-weight:600;color:var(--sub);font-family:inherit;outline:none;cursor:pointer}
.dl-status:focus{border-color:var(--primary)}

.dl-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.dl-tag{padding:8px 14px;border-radius:100px;border:1.5px solid var(--line);background:var(--card);font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.dl-tag small{font-weight:500;opacity:.7;margin-left:3px}
.dl-tag:hover{border-color:var(--primary);color:var(--primary)}
.dl-tag.on{background:var(--primary);border-color:var(--primary);color:#fff}
.dl-tag.on small{opacity:.85}
.dl-result{font-size:13px;color:var(--sub);padding:14px 2px 0}

.dl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-top:16px}
.dl-card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column}
.dl-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(26,127,110,.14)}
.dl-thumb{position:relative;width:100%;aspect-ratio:16/10;background:var(--primary-light);overflow:hidden}
.dl-thumb img{width:100%;height:100%;object-fit:cover;object-position:top;display:block}
.dl-thumb .dl-noimg{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--primary);font-size:12px;font-weight:600}
.dl-thumb .dl-noimg svg{width:28px;height:28px;stroke:var(--primary);opacity:.6}
.dl-badge{position:absolute;top:10px;left:10px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;backdrop-filter:blur(4px)}
.dl-badge.b1{background:rgba(230,244,241,.95);color:var(--primary-dark)}
.dl-badge.b2{background:rgba(250,238,236,.95);color:var(--stop)}
.dl-badge.b3{background:rgba(240,237,249,.95);color:var(--etc)}
.dl-cat{position:absolute;top:10px;right:10px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;background:rgba(28,43,42,.72);color:#fff;backdrop-filter:blur(4px)}
.dl-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:5px;flex:1}
.dl-name{font-size:15px;font-weight:700;letter-spacing:-.01em}
.dl-domain{font-size:12.5px;color:var(--sub);word-break:break-all}
.dl-domain a{color:var(--primary);text-decoration:none;font-weight:500}
.dl-domain a:hover{text-decoration:underline}
.dl-nourl{font-size:12.5px;color:#b0bcba}
.dl-empty{text-align:center;padding:80px 0;color:var(--sub);font-size:14px}
@media(max-width:600px){
  .dl-header h1{font-size:21px}
  .dl-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  .dl-name{font-size:13.5px}
  .dl-tags{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;margin-left:-20px;margin-right:-20px;padding-left:20px;padding-right:20px}
}
</style>
</head>

  if(tagFilter !== '전체' && item.tag !== tagFilter) return false;
  const st = item.status;
  if(statusFilter === '거래중' && st !== '거래중') return false;
  if(statusFilter === '거래중지' && st !== '거래중지') return false;
  if(statusFilter === '기타' && (st === '거래중' || st === '거래중지')) return false;
  if(!keyword) return true;
  const k = keyword.toLowerCase();
  return item.name.toLowerCase().includes(k) || (item.url||'').toLowerCase().includes(k);
}
function render(){
  const list = DATA.filter(matches).sort(SORT_FNS[sortMode]);
  resultCount.textContent = list.length + '곳 표시 중';
  empty.style.display = list.length ? 'none' : 'block';
  grid.innerHTML = list.map(item => {
    const badge = '<span class="dl-badge ' + badgeClass(item.status) + '">' + (item.status||'기타') + '</span>';
    const cat = '<span class="dl-cat">' + item.tag + '</span>';
    let thumb;
    if(item.url){
      thumb = '<a href="' + item.url + '" target="_blank" rel="noopener"><div class="dl-thumb">' + badge + cat +
        '<img loading="lazy" src="' + thumbUrl(item.url) + '" alt="' + item.name + ' 메인페이지" ' +
        'onerror="this.style.display=\'none\'"></div></a>';
    }else{
      thumb = '<div class="dl-thumb">' + badge + cat + '<div class="dl-noimg"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M3.5 12h17M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>도메인 없음</div></div>';
    }
    const domainHtml = item.url
      ? '<div class="dl-domain"><a href="' + item.url + '" target="_blank" rel="noopener">' + cleanDomain(item.url) + '</a></div>'
      : '<div class="dl-nourl">등록된 도메인 없음</div>';
    return '<div class="dl-card">' + thumb + '<div class="dl-body"><div class="dl-name">' + item.name + '</div>' + domainHtml + '</div></div>';
  }).join('');
}
document.getElementById('searchInput').addEventListener('input', e => { keyword = e.target.value.trim(); render(); });
document.getElementById('statusSel').addEventListener('change', e => { statusFilter = e.target.value; render(); });
document.getElementById('sortSel').addEventListener('change', e => { sortMode = e.target.value; render(); });
render();
</script>

  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
</button>
<style>
.dl-top-btn{position:fixed;right:24px;bottom:28px;z-index:100;width:46px;height:46px;border:none;border-radius:50%;background:var(--primary);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(26,127,110,.35);opacity:0;visibility:hidden;transform:translateY(10px);transition:opacity .25s,visibility .25s,transform .25s,background .2s}

</style>

  var btn = document.getElementById('dlTopBtn');

    btn.classList.toggle('dl-top-show', window.scrollY > 300);
  }, {passive:true});
  btn.addEventListener('click', function(){
    window.scrollTo({top:0, behavior:'smooth'});
  });
})();
</script>
